# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.

parameters:
    admin.password_hash: '%env(ADMIN_PASSWORD_HASH)%'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            - '../src/**/CommandInterface.php'
            - '../src/**/QueryInterface.php'
            - '../src/**/CommandHandlerInterface.php'
            - '../src/**/QueryHandlerInterface.php'
            - '../src/**/EventDispatcherInterface.php'
            - '../src/**/CommandBusInterface.php'
            - '../src/**/QueryBusInterface.php'

    # Command Bus Adapter
    App\Application\Shared\Bus\CommandBusInterface:
        class: App\Infrastructure\Bus\SymfonyCommandBus

    # Query Bus Adapter
    App\Application\Shared\Bus\QueryBusInterface:
        class: App\Infrastructure\Bus\SymfonyQueryBus

    # Event Dispatcher
    App\Application\Shared\Event\EventDispatcherInterface:
        class: App\Infrastructure\Event\SymfonyEventDispatcher

    # Audit Logger (channel 'audit')
    App\Infrastructure\Logging\AuditLogger:
        arguments:
            $auditLogger: '@monolog.logger.audit'

    # Domain Services
    App\Domain\Admin\Service\AuthenticationService:
        arguments:
            $adminPasswordHash: '%admin.password_hash%'
            $sessionTtlSeconds: 7200

    # Repository Interfaces -> Implementations
    App\Domain\Contact\Repository\ContactLeadRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineContactLeadRepository

    App\Domain\Service\Repository\ServiceRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineServiceRepository

    App\Domain\Faq\Repository\FaqRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineFaqRepository

    App\Domain\SiteSetting\Repository\SiteSettingRepositoryInterface:
        class: App\Infrastructure\Persistence\Doctrine\Repository\DoctrineSiteSettingRepository

    # Message Handlers - Commands
    App\Application\Contact\Command\CreateContactLeadCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\Admin\Command\LoginAdminCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\Admin\Command\LogoutAdminCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\Service\Command\CreateServiceCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\Service\Command\UpdateServiceCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\Service\Command\DeleteServiceCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\Faq\Command\CreateFaqCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\Faq\Command\UpdateFaqCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\Faq\Command\DeleteFaqCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    App\Application\SiteSetting\Command\UpdateSiteSettingsCommandHandler:
        tags:
            - { name: messenger.message_handler, bus: command.bus, method: handle }

    # Message Handlers - Queries
    App\Application\Service\Query\GetServicesQueryHandler:
        tags:
            - { name: messenger.message_handler, bus: query.bus, method: handle }

    App\Application\Service\Query\GetServiceBySlugQueryHandler:
        tags:
            - { name: messenger.message_handler, bus: query.bus, method: handle }

    App\Application\Faq\Query\GetFaqsQueryHandler:
        tags:
            - { name: messenger.message_handler, bus: query.bus, method: handle }

    App\Application\SiteSetting\Query\GetPublicSiteSettingsQueryHandler:
        tags:
            - { name: messenger.message_handler, bus: query.bus, method: handle }

    App\Application\Admin\Query\GetAdminSessionQueryHandler:
        tags:
            - { name: messenger.message_handler, bus: query.bus, method: handle }

    # Event Listeners
    App\Infrastructure\EventListener\ContactLeadCreatedEventListener:
        tags:
            - { name: kernel.event_listener, event: App\Application\Contact\Event\ContactLeadCreatedEvent }
