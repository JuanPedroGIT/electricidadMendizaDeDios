monolog:
  channels:
    - deprecation
    - security
    - audit

when@dev:
  monolog:
    handlers:
      main:
        type: stream
        path: '%kernel.logs_dir%/%kernel.environment%.log'
        level: debug
        channels: ['!event']
      audit:
        type: stream
        path: '%kernel.logs_dir%/audit.log'
        level: info
        channels: ['audit']
        formatter: monolog.formatter.json
      console:
        type: console
        process_psr_3_messages: false
        channels: ['!event', '!doctrine', '!console']

when@test:
  monolog:
    handlers:
      main:
        type: fingers_crossed
        action_level: error
        handler: nested
        excluded_http_codes: [404, 405]
        channels: ['!event']
      nested:
        type: stream
        path: '%kernel.logs_dir%/%kernel.environment%.log'
        level: debug

when@prod:
  monolog:
    handlers:
      main:
        type: fingers_crossed
        action_level: error
        handler: nested
        excluded_http_codes: [400, 401, 403, 404, 405]
      nested:
        type: stream
        path: php://stderr
        level: debug
        formatter: monolog.formatter.json
      audit:
        type: stream
        path: '%kernel.logs_dir%/audit.log'
        level: info
        channels: ['audit']
        formatter: monolog.formatter.json
      audit_rotating:
        type: rotating_file
        path: '%kernel.logs_dir%/audit.log'
        level: info
        max_files: 30
        channels: ['audit']
        formatter: monolog.formatter.json
